<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 14.1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4 text-center">
        <div class="alert alert-danger d-md-none">
            Visible only on Mobile and Small Screens (Hidden on Desktop)
        </div>
        
        <div class="alert alert-primary d-none d-md-block d-lg-none">
            Visible only on Tablets (Medium Screens)
        </div>
        
        <div class="alert alert-success d-none d-lg-block">
            Visible only on Desktop and Large Screens
        </div>
    </div>
</body>
</html>
